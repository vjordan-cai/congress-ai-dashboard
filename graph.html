<!DOCTYPE html>
<html>

<head>

    <title>Congress AI Graph Intelligence</title>

    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>

        body {
            background: #111;
            color: white;
            font-family: Arial;
        }

        svg {
            width: 100vw;
            height: 100vh;
        }

    </style>

</head>

<body>

<svg></svg>

<script>

fetch("/graph/network")

.then(r => r.json())

.then(data => {

    const svg = d3.select("svg");

    const width = window.innerWidth;
    const height = window.innerHeight;

    const simulation = d3.forceSimulation(data.nodes)

        .force(
            "link",
            d3.forceLink(data.edges)
                .id(d => d.id)
                .distance(120)
        )

        .force(
            "charge",
            d3.forceManyBody().strength(-300)
        )

        .force(
            "center",
            d3.forceCenter(width / 2, height / 2)
        );

    // =====================================================
    // LINKS
    // =====================================================

    const link = svg.append("g")
        .selectAll("line")
        .data(data.edges)
        .enter()
        .append("line")
        .attr("stroke", "#666");

    // =====================================================
    // NODES
    // =====================================================

    const node = svg.append("g")
        .selectAll("circle")
        .data(data.nodes)
        .enter()
        .append("circle")
        .attr("r", 10)

        .attr("fill", d => {

            if (d.type === "member") {
                return "#00ff99";
            }

            return "#4fd1ff";
        })

        .call(
            d3.drag()

            .on("start", dragstarted)
            .on("drag", dragged)
            .on("end", dragended)
        );

    // =====================================================
    // LABELS
    // =====================================================

    const label = svg.append("g")
        .selectAll("text")
        .data(data.nodes)
        .enter()
        .append("text")

        .text(d => d.label)

        .attr("font-size", 12)
        .attr("dx", 12)
        .attr("dy", 4)
        .attr("fill", "white");

    // =====================================================
    // TICK
    // =====================================================

    simulation.on("tick", () => {

        link

            .attr("x1", d => d.source.x)
            .attr("y1", d => d.source.y)

            .attr("x2", d => d.target.x)
            .attr("y2", d => d.target.y);

        node

            .attr("cx", d => d.x)
            .attr("cy", d => d.y);

        label

            .attr("x", d => d.x)
            .attr("y", d => d.y);
    });

    // =====================================================
    // DRAG
    // =====================================================

    function dragstarted(event, d) {

        if (!event.active)
            simulation.alphaTarget(0.3).restart();

        d.fx = d.x;
        d.fy = d.y;
    }

    function dragged(event, d) {

        d.fx = event.x;
        d.fy = event.y;
    }

    function dragended(event, d) {

        if (!event.active)
            simulation.alphaTarget(0);

        d.fx = null;
        d.fy = null;
    }

});

</script>

</body>

</html>
